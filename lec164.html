<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מדריך רכוש קבוע - IAS 16</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; padding: 0; background-color: #f8fafc; font-family: 'Heebo', sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: translateY(0) } }
    .ltr-math { direction: ltr; display: inline-block; font-family: 'Rubik', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;

    /* ═══════════ COLORS & UTILS ═══════════ */
    const C = {
      bg:"#f8fafc",card:"#fff",bdr:"#e2e8f0",
      blue:"#1e40af",blueL:"#dbeafe",blueM:"#3b82f6",
      grn:"#059669",grnL:"#d1fae5",
      red:"#dc2626",redL:"#fee2e2",
      amb:"#b45309",ambL:"#fef3c7",
      pur:"#6d28d9",purL:"#ede9fe",
      txt:"#1e293b",txtM:"#475569",txtL:"#94a3b8",
      pink:"#be185d"
    };

    const fm = n => {
      if(n==null) return "—";
      const a=Math.abs(Math.round(n));
      return (n<0?"(":"")+a.toLocaleString("en-US")+(n<0?")":"");
    };

    /* ═══════════ COMPONENTS ═══════════ */

    // 1. Overview Block
    function ExerciseOverview({ topics }) {
      return (
        <div style={{background:"#f0fdf4", border:`2px solid #bbf7d0`, padding:"16px 20px", borderRadius:12, marginBottom:24, animation:"fadeIn 0.5s ease"}}>
          <div style={{fontWeight:800, color:C.grn, marginBottom:10, fontSize:15, display:"flex", alignItems:"center", gap:8}}>
            <span>🎯</span> <span>בשאלה זו נראה ונתרגל את הסוגיות הבאות:</span>
          </div>
          <ul style={{margin:0, paddingRight:22, color:C.txtM, fontSize:14, lineHeight:1.8}}>
            {topics.map((t,i)=><li key={i}>{t}</li>)}
          </ul>
        </div>
      );
    }

    // 2. Field Input Component
    function F({label,expected,onSolve,explanation,tolerance=2, excel=null, children}){
      const [v,setV]=useState("");
      const [st,setSt]=useState(null);
      const [att,setAtt]=useState(0);
      const [showExp,setShowExp]=useState(false);
      const [showAns,setShowAns]=useState(false);
      const abs=Math.abs(expected);
      
      const check=()=>{
        const n=parseFloat(v.replace(/,/g,""));
        if(isNaN(n)){setSt("w");setAtt(a=>a+1);return;}
        if(Math.abs(n-abs)<=tolerance){setSt("ok");if(onSolve)onSolve();}
        else{setSt("w");setAtt(a=>a+1);}
      };

      const btnStyle = {padding:"6px 12px", borderRadius:6, border:"none", fontSize:12, cursor:"pointer", fontWeight:600, fontFamily:"'Heebo',sans-serif", display:"flex", alignItems:"center", gap:6};

      return(
        <div style={{marginBottom:18, padding:"12px 16px", background:"#fafafa", border:`1px solid #f1f5f9`, borderRadius:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <span style={{fontSize:14,color:C.txt,minWidth:170,fontWeight:600}}>{label}</span>
            <input type="text" value={v} onChange={e=>{setV(e.target.value);setSt(null);}}
              onKeyDown={e=>e.key==="Enter"&&check()} disabled={st==="ok" || showAns}
              style={{width:140,padding:"8px 12px",border:`2px solid ${st==="ok"||showAns?C.grn:st==="w"?C.red:C.bdr}`,borderRadius:8,fontSize:15,fontFamily:"'Rubik',sans-serif",background:st==="ok"||showAns?C.grnL:st==="w"?C.redL:"#fff",textAlign:"left",direction:"ltr",outline:"none"}}
              placeholder="הקלד כאן..." />
            <button onClick={check} disabled={st==="ok" || showAns} style={{padding:"8px 16px",borderRadius:8,border:"none",background:st==="ok"||showAns?C.grn:C.blueM,color:"#fff",fontSize:13,cursor:"pointer",fontWeight:600,fontFamily:"'Heebo',sans-serif"}}>{st==="ok"||showAns?"✓":"בדוק תשובה"}</button>
            {(st==="ok" || showAns)&&<span style={{color:C.grn,fontSize:14,fontWeight:700}}>✓ {fm(expected)}</span>}
          </div>
          
          {/* Feedback on Wrong */}
          {st==="w" && !showAns && (
            <div style={{marginTop: 10, padding: "10px 14px", background: "#fff", border: `1px solid ${C.redL}`, borderRadius: 8, borderRight: `4px solid ${C.red}`, animation:"fadeIn 0.3s ease"}}>
              <div style={{fontSize: 13, color: C.red, marginBottom: 8, fontWeight:600}}>
                 {att === 1 ? "✗ התוצאה אינה מדויקת. נסו לבדוק את החישוב שוב." : "✗ עדיין לא מדויק. כדאי להיעזר בדרך החישוב המלאה."}
              </div>
              <div style={{display:"flex", gap: 8, flexWrap:"wrap"}}>
                 {!showExp && <button onClick={()=>setShowExp(true)} style={{...btnStyle, background:C.ambL, color:C.amb}}>💡 הצג דרך חישוב (רמז)</button>}
                 {att >= 3 && <button onClick={()=>{setShowAns(true); setSt("ok"); if(onSolve)onSolve();}} style={{...btnStyle, background:C.purL, color:C.pur}}>📖 גלה לי את התשובה</button>}
              </div>
              {showExp && (
                <div style={{marginTop: 10, padding: 12, background: C.ambL, color: C.amb, borderRadius: 6, fontSize: 13, lineHeight: 1.7}}>
                  <b style={{display:"block", marginBottom:4}}>דרך חישוב:</b> {explanation}
                  {excel && <div style={{marginTop:6, background:"#fff", padding:"4px 8px", borderRadius:4, display:"inline-block"}}><span style={{color:C.txtM, fontSize:12}}>פונקציית אקסל:</span> <span dir="ltr" style={{fontFamily:"monospace", color:C.amb, fontWeight:"bold", marginLeft:4}}>{excel}</span></div>}
                </div>
              )}
            </div>
          )}

          {/* Feedback on Correct */}
          {(st==="ok" || showAns) && explanation && (
            <div style={{marginTop: 10, padding: 14, background: C.grnL, color: C.grn, borderRadius: 8, fontSize: 13, lineHeight: 1.7, animation:"fadeIn 0.4s ease", border:`1px solid #a7f3d0`}}>
              <b style={{display:"block", marginBottom:4}}>💡 דרך הפתרון והסבר:</b> {explanation}
              {excel && <div style={{marginTop:6, background:"#fff", padding:"4px 8px", borderRadius:4, display:"inline-block", border:`1px solid #a7f3d0`}}><span style={{color:C.grn, fontSize:12}}>פונקציית אקסל:</span> <span dir="ltr" style={{fontFamily:"monospace", color:C.grn, fontWeight:"bold", marginLeft:4}}>{excel}</span></div>}
            </div>
          )}

          {/* Children block (e.g., JE) appears after solved */}
          {(st==="ok" || showAns) && children && (
            <div style={{marginTop: 12, animation:"fadeIn 0.5s ease"}}>
              {children}
            </div>
          )}
        </div>
      );
    }

    // 3. Journal Entry
    function JE({entries,title,date}){
      return(
        <div style={{background:"#fff",border:`1px solid ${C.bdr}`,borderRadius:10,padding:14,marginBottom:12, boxShadow:"0 2px 4px rgba(0,0,0,0.02)"}}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:8}}>
            {title&&<div style={{fontSize:13,fontWeight:800,color:C.blue}}>{title}</div>}
            {date&&<div style={{fontSize:11,color:C.txtL, background:"#f1f5f9", padding:"2px 6px", borderRadius:4}}>{date}</div>}
          </div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{borderBottom:`2px solid ${C.bdr}`}}>
              <th style={{textAlign:"right",padding:"4px 6px",color:C.txtL,fontWeight:500}}>חשבון</th>
              <th style={{textAlign:"center",padding:"4px 6px",color:C.txtL,fontWeight:500,width:90}}>חובה</th>
              <th style={{textAlign:"center",padding:"4px 6px",color:C.txtL,fontWeight:500,width:90}}>זכות</th>
            </tr></thead>
            <tbody>{entries.map((e,i)=>(
              <tr key={i} style={{borderBottom:`1px solid #f1f5f9`}}>
                <td style={{padding:"6px 6px", fontWeight:500}}>{e.a}</td>
                <td style={{padding:"6px 6px",textAlign:"center",color:C.blue,fontFamily:"'Rubik',sans-serif", fontWeight:600}}>{e.d?fm(e.d):""}</td>
                <td style={{padding:"6px 6px",textAlign:"center",color:C.grn,fontFamily:"'Rubik',sans-serif", fontWeight:600}}>{e.c?fm(e.c):""}</td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      );
    }

    // 4. Reveal & Helpers
    function Reveal({show,children}){
      if(!show) return null;
      return <div style={{animation:"fadeIn 0.5s ease"}}>{children}</div>;
    }

    function Info({type="info",children}){
      const m={info:{bg:C.blueL,c:C.blue,i:"📘"},std:{bg:C.purL,c:C.pur,i:"💡"},ok:{bg:C.grnL,c:C.grn,i:"✅"},warn:{bg:C.ambL,c:C.amb,i:"⚠️"}};
      const x=m[type]||m.info;
      return <div style={{padding:"12px 16px",background:x.bg,borderRadius:8,marginBottom:16,fontSize:13,lineHeight:1.8,color:x.c,borderRight:`4px solid ${x.c}`}}><span style={{marginRight:4}}>{x.i}</span> {children}</div>;
    }

    const ResetNote = () => (
      <div style={{fontSize:13, color:C.txtM, marginTop:-6, marginBottom:16, padding:"10px 14px", background:"#f1f5f9", borderRadius:8, borderRight:`4px solid ${C.txtL}`, lineHeight:1.7}}>
        <b>למה הערך נשאר זהה? (מיון פנימי)</b><br/>
        פעולת "איפוס פחת נצבר" היא פעולת <b>מיון פנימי מאזני בלבד</b>. אנו מקטינים את שווי המכונה ברוטו (בזכות) ומקטינים את הפחת הנצבר (בחובה) באותו סכום בדיוק. <br/>
        <u style={{fontWeight:700}}>התוצאה:</u> ערך הספרים נטו של הנכס נשאר זהה לחלוטין לפני ואחרי האיפוס. מטרת הפעולה היא רק "לנקות" את החשבונות לקראת השערוך.
      </div>
    );

    const ImpairmentProvNote = () => (
      <div style={{fontSize:13, color:C.amb, marginTop:12, marginBottom:16, padding:"10px 14px", background:C.ambL, borderRadius:8, borderRight:`4px solid ${C.amb}`, lineHeight:1.7}}>
        <b>💡 טיפ זהב לחישוב (הפחתת הפרשה):</b><br/>
        שימו לב שפעולת הפחתת ההפרשה משפיעה רק על החשבונות השונים בתוך המאזן (מקטינה הפרשה ומגדילה פחת נצבר) - <b>אך אינה משנה כלל את ערך הספרים נטו!</b><br/>
        לכן, דרך הקיצור לחשב את ערך הספרים החדש היא פשוט לקחת את ערך הספרים של תחילת השנה, ולהפחית ממנו את <b>הוצאות הפחת הרגילות בלבד</b>.
      </div>
    );

    function Step({n,title,color=C.blue,open,toggle,children}){
      return(
        <div style={{marginBottom:20,border:`1px solid ${C.bdr}`,borderRadius:12,overflow:"hidden",background:C.card, boxShadow:"0 4px 6px rgba(0,0,0,0.03)"}}>
          <div onClick={toggle} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 20px",cursor:"pointer",background:open?color:"#fff", transition:"all 0.2s"}}>
            <div style={{width:32,height:32,borderRadius:8,background:open?"rgba(255,255,255,0.2)":color+"15",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Rubik',sans-serif",fontWeight:800,fontSize:14,color:open?"#fff":color}}>{n}</div>
            <div style={{flex:1,fontWeight:700,fontSize:15,color:open?"#fff":C.txt}}>{title}</div>
            <span style={{color:open?"#fff":C.txtL, fontWeight:700}}>{open?"▲":"▼"}</span>
          </div>
          {open&&<div style={{padding:"24px 20px", background:"#fff"}}>{children}</div>}
        </div>
      );
    }

    /* ═══════════ DETAILED MOVEMENT TRACKER ═══════════ */
    function MT({ rows }) {
      return(
        <div style={{marginTop:16, marginBottom:20, background:"#fff", border:`2px solid ${C.blueL}`, borderRadius:10, overflow:"hidden", animation:"fadeIn 0.5s ease"}}>
          <div style={{background:C.blueL, padding:"10px 16px", fontSize:14, fontWeight:800, color:C.blue, display:"flex", alignItems:"center", gap:8}}>
            <span>🔍</span> <span>מעקב תנועות מפורט — איך הגענו לכל יתרה?</span>
          </div>
          <table style={{width:"100%", borderCollapse:"collapse", fontSize:13}}>
            <tbody>
              {rows.map((row, i) => (
                <tr key={i} style={{borderBottom: i<rows.length-1 ? `1px solid ${C.bdr}` : 'none'}}>
                  <td style={{padding:"14px 16px", fontWeight:700, color:C.txt, width:"25%", borderLeft:`1px solid ${C.bdr}`, background:"#f8fafc", verticalAlign:"top"}}>{row.n}</td>
                  <td style={{padding:"14px 16px", color:C.txtM, lineHeight:1.7}}>
                    <div style={{direction:"rtl", marginBottom:6, fontFamily:"'Rubik',sans-serif", color:C.txt, fontWeight:500, display:"flex", flexWrap:"wrap", gap:8, alignItems:"center"}}>
                      <span style={{color:C.txtL, fontSize:12, fontWeight:400}}>חישוב:</span>
                      <span className="ltr-math">{row.c}</span>
                      <span>=</span>
                      <span style={{background:C.blueM, color:"#fff", padding:"3px 10px", borderRadius:6, fontWeight:700, fontSize:14, letterSpacing:0.5}}>{fm(row.v)}</span>
                    </div>
                    <div style={{fontSize:13, color:C.txtM, background:"#f1f5f9", padding:"6px 10px", borderRadius:6, borderRight:`3px solid ${C.txtL}`}}>📝 {row.exp}</div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    /* ═══════════ SUMMARY TABLE ═══════════ */
    function SummaryTable({columns,rows, show=true, title="📊 טבלת ביניים — תבנית מרכזת"}){
      if(!show) return null;
      return(
        <div style={{overflowX:"auto",marginTop:24,marginBottom:10, animation:"fadeIn 0.5s ease", background:"#fff", padding:20, borderRadius:12, border:`2px solid ${C.bdr}`, boxShadow:"0 4px 12px rgba(0,0,0,0.03)"}}>
          <div style={{fontSize:15,fontWeight:800,color:C.blue,marginBottom:14}}>{title}</div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:Math.max(400, columns.length * 80)}}>
            <thead><tr style={{background:C.blue}}>
              <th style={{padding:"8px 10px",color:"#fff",textAlign:"right",fontWeight:700,position:"sticky",right:0,background:C.blue,zIndex:1, width:180}}>סעיף</th>
              {columns.map((col,i)=><th key={i} style={{padding:"8px 6px",color:"#fff",textAlign:"center",fontWeight:600,fontSize:12,whiteSpace:"pre-wrap"}}>{col}</th>)}
            </tr></thead>
            <tbody>{rows.map((row,ri)=>(
              <tr key={ri} style={{borderBottom:row.label.trim()==="" ? "none" : `1px solid ${C.bdr}`,background:row.bold?"#f8fafc":row.label.trim()===""?"transparent":"#fff", height:row.label.trim()===""?12:"auto"}}>
                <td style={{padding:"8px 10px",fontWeight:row.bold?800:500,color:row.bold?C.blue:C.txt,position:"sticky",right:0,background:row.bold?"#e0e7ff":row.label.trim()===""?"transparent":"#fff",zIndex:1,whiteSpace:"nowrap", borderLeft:`1px solid ${C.bdr}`}}>{row.label}</td>
                {row.values.map((v,vi)=><td key={vi} style={{padding:"8px 6px",textAlign:"center",fontFamily:"'Rubik',sans-serif",fontSize:13,color:v<0?C.red:C.txt, direction:"ltr", fontWeight:row.bold?700:400}}>{v!=null?fm(v):""}</td>)}
              </tr>
            ))}</tbody>
          </table>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════
       EXERCISE 1 — FULL DETAIL
       ═══════════════════════════════════════════════════════════ */
    function Ex1(){
      const [os,setOs]=useState(1);
      const [solved,setSolved]=useState({});
      const mark=(k)=>setSolved(p=>({...p,[k]:true}));
      const ok=k=>solved[k];
      const allOk=(...keys)=>keys.every(k=>solved[k]);

      const cols = ["1.1.16","31.12.16\nטרם","31.12.16\nאחרי","31.12.17\nטרם","31.12.17\nאחרי","31.12.18\nטרם","31.12.18\nאחרי","31.12.19\nטרם","31.12.19\nאחרי","31.12.20\nטרם","31.12.20\nאחרי","30.6.21\nמכירה"];
      const rows = [
        {label:"מכונה (ברוטו)",values:[805624,805624,1050000,1050000,758560,758560,738598,738598,780000,780000,1000000,1000000],bold:false},
        {label:"פחת נצבר",values:[0,-20141,0,-26923,0,-19962,0,-19962,0,-21667,0,-14286]},
        {label:"הפרשה לי״ע",values:[0,0,0,0,-158560,-154387,-318598,-309987,0,0,0,0]},
        {label:"ערך ספרים נטו",values:[805624,785483,1050000,1023077,600000,584211,420000,408649,780000,758333,1000000,985714],bold:true},
        {label:" ",values:[]},
        {label:"הוצאות פחת",values:[null,20141,20141,26923,26923,15789,15789,11351,11351,21667,21667,14286]},
        {label:"הוצאות מימון",values:[null,36281,36281,38095,38095,null,null,null,null,null,null,null]},
        {label:"הפסד מי״ע (ברוו״ה)",values:[null,null,null,null,158560,null,164211,null,null,null,null,null]},
        {label:"רווח מעליית ערך (ברוו״ה)",values:[null,null,null,null,null,null,null,null,309987,null,null,null]},
        {label:"רווח/הפסד הון במכירה",values:[null,null,null,null,null,null,null,null,null,null,null,-109524]},
        {label:"  ",values:[]},
        {label:"תנועה בקרן הערכה (OCI)",values:[null,null,264517,null,-264517,null,null,null,61364,null,241667,null],bold:false},
        {label:"יתרת קרן הערכה מחדש",values:[0,0,264517,264517,0,0,0,0,61364,61364,303031,0],bold:true},
      ];
      const Tbl = ({lim, title}) => <SummaryTable columns={cols.slice(0,lim)} rows={rows.map(r=>({...r,values:r.values.slice(0,lim)}))} title={title||"📊 טבלת ביניים (לפי הדיווח השנתי המצטבר)"} />;

      return(<div>
        <ExerciseOverview topics={[
          "חישוב עלות פריט כולל עלויות נלוות והיוון תמורה נדחית (PV).",
          "הכרה בהוצאות מימון על ההתחייבות לאורך זמן.",
          "יישום מודל הערכה מחדש (שערוך כלפי מעלה) - ורישום פקודת איפוס פח״נ.",
          "ירידת ערך מהותית - כיצד לקזז מקרן קיימת וכיצד לרשום הפסד והפרשה.",
          "מכירת נכס בתמורה עתידית (נדחית) וחישוב רווח/הפסד הון בהתאמה."
        ]} />

        <div style={{background:C.ambL,borderRadius:14,padding:20,marginBottom:24,borderRight:`5px solid ${C.amb}`}}>
          <div style={{fontWeight:800,fontSize:17,color:C.amb,marginBottom:8}}>נתוני התרגיל — חברת "קריספי העיר"</div>
          <div style={{fontSize:14,color:C.txtM,lineHeight:2}}>
            רכשה ב-<b>1.1.2016</b> מכונה לחימום נקניק.<br/>
            עלות המכונה (מחירון): <b>800,000</b>. דמי תיווך: <b>25,000</b>. משפטיות: <b>55,000</b> (שולמו מיד).<br/>
            ה-800,000 ישולמו בחלוף <b>שנתיים</b>. מחיר הון: <b>5%</b>.<br/>
            חיים שימושיים: <b>40 שנה</b>. ללא שייר. מודל הערכה מחדש, שנתי. פח"נ מאופס.<br/>
            קרן → עודפים מועברת במימוש בלבד. התחייבות מסולקת במועדה (31.12.2017).

          <Reveal show={ok("3a")}>
            <F label="הפסד ברוו״ה (הפרשה):" expected={20000} onSolve={()=>mark("3b")} explanation="ערך לפני שערוך (332,500). שווי הוגן 260,000. הירידה 72,500. מתוך זה, 52,500 אוכלים את כל הקרן (60k - 7.5k), וה-20,000 הנותרים הם הפסד.">
              <JE title="איפוס פח״נ וירידת הערך" entries={[
                {a:"פחת נצבר",d:47500},{a:"מכונה ברוטו",c:47500},
                {a:"קרן הערכה מחדש",d:52500},{a:"הפסד מירידת ערך (רוו״ה)",d:20000},
                {a:"מכונה (ברוטו)",c:72500}
              ]}/>
              <Tbl lim={4} />
            </F>
          </Reveal>
        </Step>

        <Step n="4" title="2023 — התאוששות (ביטול הפרשה וקרן)" color={C.grn} open={os===4} toggle={()=>setOs(os===4?0:4)}>
          <F label="הוצאות פחת וביטול הפרשה:" expected={37142.86} onSolve={()=>mark("4a")} explanation="פחת: 260,000 ÷ 7 = 37,143. הפחתת הפרשה: 20,000 ÷ 7 = 2,857.">
            <JE date="31.12.2023" entries={[
              {a:"הוצאות פחת",d:37143},{a:"פחת נצבר",c:37143},
              {a:"הפרשה לירידת ערך",d:2857},{a:"פחת נצבר",c:2857}
            ]}/>
          </F>
          <Reveal show={ok("4a")}>
            <F label="עליית ערך → קרן הערכה:" expected={70000} onSolve={()=>mark("4b")} explanation="נטו לפני שערוך: 260,000 - 37,143 = 222,857. שווי הוגן 310,000. העלייה היא 87,143. מתוכה 17,143 (יתרת ההפרשה) נרשמות כרווח, והשאר (70,000) הופך לקרן חדשה.">
              <JE title="איפוס פח״נ מורכב ושערוך מעורב" entries={[
                {a:"פחת נצבר",d:34286},{a:"מכונה ברוטו",c:34286},
                {a:"הפרשה לירידת ערך",d:17143},{a:"מכונה ברוטו",d:70000},
                {a:"רווח מעליית ערך (רוו״ה)",c:17143},{a:"קרן הערכה מחדש",c:70000}
              ]}/>
              <Tbl lim={5} />
            </F>
          </Reveal>
        </Step>

        <Step n="5" title="1.1.2024 — מכירה" color={C.pink} open={os===5} toggle={()=>setOs(os===5?0:5)}>
          <F label="רווח הון במכירה:" expected={8000} onSolve={()=>mark("5a")} explanation="תמורה (318,000) פחות ערך ספרים (310,000) נותן 8,000 רווח. כל הקרן (70,000) עפה לעודפים.">
             <JE date="1.1.2024" entries={[
               {a:"מזומן",d:318000},{a:"מכונה ברוטו",c:310000},{a:"רווח הון",c:8000}
             ]}/>
             <JE title="חיסול הקרן" entries={[{a:"קרן הערכה מחדש",d:70000},{a:"עודפים",c:70000}]}/>
             <MT rows={[
               {n:"ערך ספרים נטו", c:"310,000 - 310,000 (גריעה)", v:0, exp:"הנכס נמחק לחלוטין."},
               {n:"קרן הערכה מחדש", c:"70,000 - 70,000 (העברה)", v:0, exp:"קרן ההערכה נסגרת במלואה בעת הגריעה ומועברת סוף סוף לעודפים הניתנים לחלוקה."}
             ]} />
          </F>
        </Step>

        <Tbl lim={6} title="📊 טבלת סיכום סופית — תבנית אחידה ומלאה" show={ok("5a")} />
      </div>);
    }

    /* ═══════════════════════════════════════════════════════════
       MAIN APP
       ═══════════════════════════════════════════════════════════ */
    function App(){
      const [ex,setEx]=useState(1);
      const tabs=[
        {id:1,t:"תרגיל 1",s:"PV + הפרשה + מכירה",c:C.amb},
        {id:2,t:"תרגיל 2",s:"שערוך שנתי + עלויות עסקה",c:C.blueM},
        {id:3,t:"תרגיל 3",s:"הפחתת קרן (כל שנתיים)",c:C.pur},
        {id:4,t:"תרגיל 4",s:"הפחתת קרן (שנתי)",c:C.grn},
      ];
      
      return(
        <div dir="rtl" style={{fontFamily:"'Heebo',sans-serif",background:C.bg,minHeight:"100vh", paddingBottom: 60}}>
          <div style={{background:"#fff",borderBottom:`1px solid ${C.bdr}`,padding:"16px 20px",position:"sticky",top:0,zIndex:10, boxShadow:"0 2px 10px rgba(0,0,0,0.03)"}}>
            <div style={{maxWidth:920,margin:"0 auto"}}>
              <div style={{fontSize:11,color:C.txtL,letterSpacing:2,fontWeight:700}}>IAS 16 — REVALUATION MODEL</div>
              <div style={{fontFamily:"'Rubik',sans-serif",fontSize:22,fontWeight:800,color:C.txt}}>רכוש קבוע: מודל הערכה מחדש — המדריך המלא</div>
            </div>
          </div>
          
          <div style={{maxWidth:920,margin:"0 auto",padding:"24px 16px"}}>
            <div style={{display:"flex",gap:8,marginBottom:24,flexWrap:"wrap"}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setEx(t.id)} style={{padding:"10px 18px",borderRadius:10,border:ex===t.id?`2px solid ${t.c}`:`1px solid ${C.bdr}`,background:ex===t.id?t.c+"15":"#fff",cursor:"pointer",textAlign:"right", transition:"all 0.2s"}}>
                <div style={{fontWeight:800,fontSize:14,color:ex===t.id?t.c:C.txt}}>{t.t}</div>
                <div style={{fontSize:12,color:C.txtM,marginTop:2}}>{t.s}</div>
              </button>
            ))}
            </div>
            
            {ex===1&&<Ex1/>}
            {ex===2&&<Ex2/>}
            {ex===3&&<Ex3/>}
            {ex===4&&<Ex4/>}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
