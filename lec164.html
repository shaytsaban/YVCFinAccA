<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מדריך רכוש קבוע - IAS 16</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  
  <!-- React & ReactDOM (Production versions) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; padding: 0; background-color: #f5f6fa; font-family: 'Heebo', sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;

    /* ═══════════ COLORS & UTILS ═══════════ */
    const C = {
      bg:"#f5f6fa",card:"#fff",bdr:"#e2e8f0",
      blue:"#1e40af",blueL:"#dbeafe",blueM:"#3b82f6",
      grn:"#059669",grnL:"#d1fae5",
      red:"#dc2626",redL:"#fee2e2",
      amb:"#b45309",ambL:"#fef3c7",
      pur:"#6d28d9",purL:"#ede9fe",
      txt:"#1e293b",txtM:"#475569",txtL:"#94a3b8",
      pink:"#be185d"
    };

    const fm = n => {
      if(n==null) return "—";
      const a=Math.abs(Math.round(n));
      return (n<0?"(":"")+a.toLocaleString("en-US")+(n<0?")":"");
    };

    /* ═══════════ FIELD: hidden solution, reveal on solve ═══════════ */
    function F({label,expected,onSolve,explanation,tolerance=2, excel=null}){
      const [v,setV]=useState("");
      const [st,setSt]=useState(null);
      const [att,setAtt]=useState(0);
      const [showExp,setShowExp]=useState(false);
      const [showAns,setShowAns]=useState(false);
      const abs=Math.abs(expected);
      
      const check=()=>{
        const n=parseFloat(v.replace(/,/g,""));
        if(isNaN(n)){setSt("w");setAtt(a=>a+1);return;}
        if(Math.abs(n-abs)<=tolerance){setSt("ok");if(onSolve)onSolve();}
        else{setSt("w");setAtt(a=>a+1);}
      };

      const btnStyle = {padding:"6px 12px", borderRadius:6, border:"none", fontSize:12, cursor:"pointer", fontWeight:600, fontFamily:"'Heebo',sans-serif", display:"flex", alignItems:"center", gap:6};

      return(
        <div style={{marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:14,color:C.txtM,minWidth:160,fontWeight:500}}>{label}</span>
            <input type="text" value={v} onChange={e=>{setV(e.target.value);setSt(null);}}
              onKeyDown={e=>e.key==="Enter"&&check()} disabled={st==="ok" || showAns}
              style={{width:130,padding:"8px 12px",border:`2px solid ${st==="ok"||showAns?C.grn:st==="w"?C.red:C.bdr}`,borderRadius:8,fontSize:15,fontFamily:"'Rubik',sans-serif",background:st==="ok"||showAns?C.grnL:st==="w"?C.redL:"#fff",textAlign:"left",direction:"ltr",outline:"none"}}
              placeholder="0" />
            <button onClick={check} disabled={st==="ok" || showAns} style={{padding:"7px 14px",borderRadius:8,border:"none",background:st==="ok"||showAns?C.grn:C.blueM,color:"#fff",fontSize:13,cursor:"pointer",fontWeight:600,fontFamily:"'Heebo',sans-serif"}}>{st==="ok"||showAns?"✓":"בדוק"}</button>
            {(st==="ok" || showAns)&&<span style={{color:C.grn,fontSize:13,fontWeight:600}}>✓ {fm(expected)}</span>}
          </div>
          
          {st==="w" && !showAns && (
            <div style={{marginTop: 8, padding: "10px 14px", background: "#fff", border: `1px solid ${C.redL}`, borderRadius: 8, borderRight: `4px solid ${C.red}`, animation:"fadeIn 0.3s ease"}}>
              <div style={{fontSize: 13, color: C.red, marginBottom: 8, fontWeight:600}}>
                 {att === 1 ? "✗ התוצאה אינה מדויקת. נסו לבדוק את החישוב שוב." : "✗ עדיין לא מדויק. כדאי להיעזר בדרך החישוב."}
              </div>
              <div style={{display:"flex", gap: 8, flexWrap:"wrap"}}>
                 {!showExp && <button onClick={()=>setShowExp(true)} style={{...btnStyle, background:C.ambL, color:C.amb}}>💡 הצג דרך חישוב</button>}
                 {att >= 3 && <button onClick={()=>{setShowAns(true); setSt("ok"); if(onSolve)onSolve();}} style={{...btnStyle, background:C.purL, color:C.pur}}>📖 גלה לי את התשובה</button>}
              </div>
              {showExp && (
                <div style={{marginTop: 10, padding: 12, background: C.ambL, color: C.amb, borderRadius: 6, fontSize: 13, lineHeight: 1.7}}>
                  <b style={{display:"block", marginBottom:4}}>דרך חישוב:</b> {explanation}
                  {excel && <div style={{marginTop:6, background:"#fff", padding:"4px 8px", borderRadius:4, display:"inline-block"}}><span style={{color:C.txtM, fontSize:12}}>פונקציית אקסל:</span> <span dir="ltr" style={{fontFamily:"monospace", color:C.grn, fontWeight:"bold", marginLeft:4}}>{excel}</span></div>}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    /* ═══════════ COMPONENTS ═══════════ */
    function JE({entries,title,date}){
      return(
        <div style={{background:"#f8fafc",border:`1px solid ${C.bdr}`,borderRadius:10,padding:14,marginBottom:12,marginTop:8}}>
          {date&&<div style={{fontSize:11,color:C.txtL}}>{date}</div>}
          {title&&<div style={{fontSize:13,fontWeight:700,color:C.blue,marginBottom:8}}>{title}</div>}
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{borderBottom:`2px solid ${C.bdr}`}}>
              <th style={{textAlign:"right",padding:"3px 6px",color:C.txtL,fontWeight:500}}>חשבון</th>
              <th style={{textAlign:"center",padding:"3px 6px",color:C.txtL,fontWeight:500,width:90}}>ח׳</th>
              <th style={{textAlign:"center",padding:"3px 6px",color:C.txtL,fontWeight:500,width:90}}>ז׳</th>
            </tr></thead>
            <tbody>{entries.map((e,i)=>(
              <tr key={i} style={{borderBottom:`1px solid ${C.bdr}`}}>
                <td style={{padding:"5px 6px"}}>{e.a}</td>
                <td style={{padding:"5px 6px",textAlign:"center",color:C.blue,fontFamily:"'Rubik',sans-serif"}}>{e.d?fm(e.d):""}</td>
                <td style={{padding:"5px 6px",textAlign:"center",color:C.grn,fontFamily:"'Rubik',sans-serif"}}>{e.c?fm(e.c):""}</td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      );
    }

    function Reveal({show,children}){
      if(!show) return null;
      return <div style={{animation:"fadeIn 0.5s ease"}}>{children}</div>;
    }

    function Info({type="info",children}){
      const m={info:{bg:C.blueL,c:C.blue,i:"📘"},std:{bg:C.purL,c:C.pur,i:"📐"},ok:{bg:C.grnL,c:C.grn,i:"✅"},warn:{bg:C.ambL,c:C.amb,i:"⚠️"}};
      const x=m[type]||m.info;
      return <div style={{padding:"10px 14px",background:x.bg,borderRadius:8,marginBottom:12,fontSize:13,lineHeight:2,color:x.c,borderRight:`4px solid ${x.c}`}}>{x.i} {children}</div>;
    }

    const ResetNote = () => (
      <div style={{fontSize:12, color:C.txtM, marginTop:-4, marginBottom:14, padding:"8px 12px", background:"#f1f5f9", borderRadius:6, borderRight:`3px solid ${C.txtL}`, lineHeight:1.6}}>
        💡 <b>חשוב להבין:</b> פקודת "איפוס פחת נצבר" היא פעולת <b>מיון פנימי בלבד</b> במאזן (הקטנת סעיף הברוטו והקטנת הפחת הנצבר באותו סכום בדיוק). <u style={{fontWeight:600}}>ערך הספרים נטו של הנכס נשאר זהה לחלוטין</u> לפני ואחרי האיפוס. רק לאחר מכן רושמים את השערוך עצמו כלפי מעלה או מטה.
      </div>
    );

    function Step({n,title,color=C.blue,open,toggle,children}){
      return(
        <div style={{marginBottom:14,border:`1px solid ${C.bdr}`,borderRadius:12,overflow:"hidden",background:C.card}}>
          <div onClick={toggle} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 18px",cursor:"pointer",background:open?color:"#fff"}}>
            <div style={{width:30,height:30,borderRadius:8,background:open?"rgba(255,255,255,0.2)":color+"15",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Rubik',sans-serif",fontWeight:700,fontSize:13,color:open?"#fff":color}}>{n}</div>
            <div style={{flex:1,fontWeight:600,fontSize:14,color:open?"#fff":C.txt}}>{title}</div>
            <span style={{color:open?"#fff":C.txtL}}>{open?"▲":"▼"}</span>
          </div>
          {open&&<div style={{padding:"18px 20px"}}>{children}</div>}
        </div>
      );
    }

    function SummaryTable({columns,rows, show=true, title="📊 טבלת ביניים — ערכים מצטברים"}){
      if(!show) return null;
      return(
        <div style={{overflowX:"auto",marginTop:20,marginBottom:10, animation:"fadeIn 0.5s ease", background:"#f8fafc", padding:14, borderRadius:10, border:`1px solid ${C.bdr}`}}>
          <div style={{fontSize:13,fontWeight:700,color:C.blue,marginBottom:8}}>{title}</div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:Math.max(400, columns.length * 70)}}>
            <thead><tr style={{background:C.blue}}>
              <th style={{padding:"6px 8px",color:"#fff",textAlign:"right",fontWeight:600,position:"sticky",right:0,background:C.blue,zIndex:1}}>סעיף</th>
              {columns.map((col,i)=><th key={i} style={{padding:"6px 6px",color:"#fff",textAlign:"center",fontWeight:500,fontSize:11,whiteSpace:"pre-wrap"}}>{col}</th>)}
            </tr></thead>
            <tbody>{rows.map((row,ri)=>(
              <tr key={ri} style={{borderBottom:row.label.trim()==="" ? "none" : `1px solid ${C.bdr}`,background:row.bold?"#f0f4ff":row.label.trim()===""?"transparent":"#fff", height:row.label.trim()===""?10:"auto"}}>
                <td style={{padding:"6px 8px",fontWeight:row.bold?700:400,color:row.bold?C.blue:C.txt,position:"sticky",right:0,background:row.bold?"#f0f4ff":row.label.trim()===""?"transparent":"#fff",zIndex:1,whiteSpace:"nowrap"}}>{row.label}</td>
                {row.values.map((v,vi)=><td key={vi} style={{padding:"6px 6px",textAlign:"center",fontFamily:"'Rubik',sans-serif",fontSize:12,color:v<0?C.red:C.txt, direction:"ltr"}}>{v!=null?fm(v):""}</td>)}
              </tr>
            ))}</tbody>
          </table>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════
       EXERCISE 1 — FULL DETAIL
       ═══════════════════════════════════════════════════════════ */
    function Ex1(){
      const [os,setOs]=useState(1);
      const [solved,setSolved]=useState({});
      const mark=(k)=>setSolved(p=>({...p,[k]:true}));
      const ok=k=>solved[k];
      const allOk=(...keys)=>keys.every(k=>solved[k]);

      const cols = ["1.1.16","31.12.16\nטרם","31.12.16\nאחרי","31.12.17\nטרם","31.12.17\nאחרי","31.12.18\nטרם","31.12.18\nאחרי","31.12.19\nטרם","31.12.19\nאחרי","31.12.20\nטרם","31.12.20\nאחרי","30.6.21\nמכירה"];
      const rows = [
        {label:"מכונה (ברוטו)",values:[805624,805624,1050000,1050000,758560,758560,738598,738598,780000,780000,1000000,1000000],bold:false},
        {label:"פחת נצבר",values:[0,-20141,0,-26923,0,-19962,0,-19962,0,-21667,0,-14286]},
        {label:"הפרשה לי״ע",values:[0,0,0,0,-158560,-154387,-318598,-309987,0,0,0,0]},
        {label:"ערך ספרים נטו",values:[805624,785483,1050000,1023077,600000,584211,420000,408649,780000,758333,1000000,985714],bold:true},
        {label:" ",values:[]},
        {label:"הוצאות פחת",values:[null,20141,20141,26923,26923,15789,15789,11351,11351,21667,21667,14286]},
        {label:"הוצאות מימון",values:[null,36281,36281,38095,38095,null,null,null,null,null,null,null]},
        {label:"הפסד מי״ע (ברוו״ה)",values:[null,null,null,null,158560,null,164211,null,null,null,null,null]},
        {label:"רווח מעליית ערך (ברוו״ה)",values:[null,null,null,null,null,null,null,null,309987,null,null,null]},
        {label:"רווח/הפסד הון במכירה",values:[null,null,null,null,null,null,null,null,null,null,null,-109524]},
        {label:"  ",values:[]},
        {label:"רווח/הפסד כולל אחר (OCI)",values:[null,null,264517,null,-264517,null,null,null,61364,null,241667,null],bold:false},
        {label:"יתרת קרן הערכה מחדש",values:[0,0,264517,264517,0,0,0,0,61364,61364,303031,0],bold:true},
      ];
      const Tbl = ({lim, title}) => <SummaryTable columns={cols.slice(0,lim)} rows={rows.map(r=>({...r,values:r.values.slice(0,lim)}))} title={title||"📊 טבלת ביניים — תבנית אחידה"} />;

      return(<div>
        <div style={{background:C.ambL,borderRadius:14,padding:20,marginBottom:24,borderRight:`5px solid ${C.amb}`}}>
          <div style={{fontWeight:800,fontSize:17,color:C.amb,marginBottom:8}}>תרגיל 1 — חברת "קריספי העיר"</div>
          <div style={{fontSize:13,color:C.txtM,lineHeight:2}}>
            רכשה ב-<b>1.1.2016</b> מכונה לחימום נקניק.<br/>
            עלות המכונה: <b>800,000</b>. דמי תיווך: <b>25,000</b>. משפטיות: <b>55,000</b> (שולמו מיד).<br/>
            ה-800,000 ישולמו בחלוף <b>שנתיים</b>. מחיר הון: <b>5%</b>.<br/>
            חיים שימושיים: <b>40 שנה</b>. ללא שייר. מודל הערכה מחדש, שנתי.<br/>
            פח"נ מאופס. קרן → עודפים במימוש בלבד. התחייבות מסולקת 31.12.2017.
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,background:"#fff",borderRadius:10,padding:12,marginTop:10}}>
            {[["31.12.2016","1,050,000"],["31.12.2017","600,000"],["31.12.2018","420,000"],["31.12.2019","780,000"],["31.12.2020","1,000,000"]].map(([d,v])=>(
              <div key={d} style={{textAlign:"center"}}><div style={{fontSize:10,color:C.txtL}}>{d}</div><div style={{fontSize:14,fontWeight:700,color:C.blue}}>{v}</div></div>
            ))}
          </div>
          <div style={{fontSize:13,color:C.txtM,lineHeight:2,marginTop:8}}>ב-<b>30.6.2021</b> נמכרה תמורת <b>920,000</b>. התמורה תתקבל ב-30.6.2022.</div>
        </div>

        <Step n="1" title="קביעת עלות הפריט — 1.1.2016" open={os===1} toggle={()=>setOs(os===1?0:1)}>
          <F label="PV של המכונה:" expected={725623.58} onSolve={()=>mark("1a")} explanation="התמורה (800,000) משולמת בעוד שנתיים. נהוון ב-5%: 800,000 ÷ (1.05)² = 725,624." excel="=PV(5%, 2, 0, -800000)" />
          <F label="עלות כוללת:" expected={805623.58} onSolve={()=>mark("1b")} explanation="עלות = ערך נוכחי של המכונה (725,624) + תיווך (25,000) + משפטיות (55,000) = 805,624." />
          <Reveal show={allOk("1a","1b")}>
            <Info type="ok">עלות כוללת: <b>805,624</b>. מתוכה — 725,624 כהתחייבות (PV), ו-80,000 במזומן.</Info>
            <JE date="1.1.2016" title="פקודת רכישה" entries={[{a:"מכונה לחימום נקניק",d:805624},{a:"מזומן (תיווך + משפטיות)",c:80000},{a:"התחייבות (זכאים)",c:725624}]}/>
            <Tbl lim={1} />
          </Reveal>
        </Step>

        <Step n="2" title="הוצאות פחת 2016" color={C.grn} open={os===2} toggle={()=>setOs(os===2?0:2)}>
          <F label="הוצאות פחת:" expected={20140.59} onSolve={()=>mark("2a")} explanation="805,624 ÷ 40 שנים = 20,141. פחת בשיטת קו ישר." />
          <Reveal show={ok("2a")}>
            <JE date="31.12.2016" title="פחת 2016" entries={[{a:"הוצאות פחת",d:20141},{a:"פחת נצבר",c:20141}]}/>
          </Reveal>
        </Step>

        <Step n="3" title="הוצאות מימון 2016" color="#0d9488" open={os===3} toggle={()=>setOs(os===3?0:3)}>
          <F label="הוצאות מימון:" expected={36281.18} onSolve={()=>mark("3a")} explanation="התחייבות (725,624) × ריבית (5%) = 36,281." />
          <F label="יתרת התחייבות תום 2016:" expected={761904.76} onSolve={()=>mark("3b")} explanation="725,624 + 36,281 = 761,905." />
          <Reveal show={allOk("3a","3b")}>
            <JE date="31.12.2016" title="הוצאות מימון" entries={[{a:"הוצאות מימון",d:36281},{a:"התחייבות (זכאים)",c:36281}]}/>
            <Tbl lim={2} />
          </Reveal>
        </Step>

        <Step n="4" title="איפוס פח״נ + שערוך 2016 — עליית ערך" color={C.pur} open={os===4} toggle={()=>setOs(os===4?0:4)}>
          <F label="ערך ספרים לאחר איפוס:" expected={785482.99} onSolve={()=>mark("4a")} explanation="עלות ברוטו (805,624) − פח״נ (20,141) = 785,483." />
          <F label="הפרש שערוך (עליית ערך):" expected={264517.01} onSolve={()=>mark("4b")} explanation="שווי הוגן (1,050,000) − ערך ספרים (785,483) = 264,517 (לקרן)." />
          <Reveal show={allOk("4a","4b")}>
            <JE date="31.12.2016" title="איפוס פחת נצבר" entries={[{a:"פחת נצבר",d:20141},{a:"מכונה",c:20141}]}/>
            <ResetNote />
            <JE title="שערוך — עליית ערך" entries={[{a:"מכונה",d:264517},{a:"קרן הערכה מחדש (OCI)",c:264517}]}/>
            <Tbl lim={3} />
          </Reveal>
        </Step>

        <Step n="5" title="2017 — פחת + מימון + שערוך (ירידת ערך מהותית)" color={C.red} open={os===5} toggle={()=>setOs(os===5?0:5)}>
          <F label="הוצאות פחת 2017:" expected={26923.08} onSolve={()=>mark("5a")} explanation="1,050,000 ÷ 39 שנים נותרות = 26,923." />
          <F label="הוצאות מימון 2017:" expected={38095.24} onSolve={()=>mark("5b")} explanation="התחייבות (761,905) × 5% = 38,095." />
          <Reveal show={allOk("5a","5b")}>
            <JE date="31.12.2017" title="פחת 2017" entries={[{a:"הוצאות פחת",d:26923},{a:"פחת נצבר",c:26923}]}/>
          </Reveal>
          <div style={{borderTop:`1px solid ${C.bdr}`,marginTop:16,paddingTop:14}}>
            <F label="ערך ספרים לאחר איפוס:" expected={1023076.92} onSolve={()=>mark("5c")} explanation="1,050,000 − 26,923 = 1,023,077." />
            <F label="ירידת ערך כוללת:" expected={423076.92} onSolve={()=>mark("5d")} explanation="1,023,077 − שווי הוגן (600,000) = 423,077." />
            <F label="שלב 1 — נגד קרן (OCI):" expected={264517.01} onSolve={()=>mark("5e")} explanation="הירידה מקוזזת קודם כל מיתרת הקרן הקיימת (264,517)." />
            <F label="שלב 2 — הפסד (ברוו״ה):" expected={158559.92} onSolve={()=>mark("5f")} explanation="היתרה: 423,077 − 264,517 = 158,560 (להפרשה)." />
          </div>
          <Reveal show={allOk("5c","5d","5e","5f")}>
            <JE date="31.12.2017" title="איפוס פח״נ" entries={[{a:"פחת נצבר",d:26923},{a:"מכונה",c:26923}]}/>

            <JE date="1.1.2024" entries={[
              {a:"מזומן",d:318000},{a:"מכונה",c:310000},{a:"רווח הון",c:8000}
            ]}/>
          </Reveal>
        </Step>

        <Tbl lim={6} title="📊 טבלת סיכום סופית — תבנית אחידה ומלאה" show={ok("5b")} />
      </div>);
    }

    /* ═══════════════════════════════════════════════════════════
       MAIN APP
       ═══════════════════════════════════════════════════════════ */
    function App(){
      const [ex,setEx]=useState(1);
      const tabs=[
        {id:1,t:"תרגיל 1",s:"PV + שערוך + הפרשה + מכירה",c:C.amb},
        {id:2,t:"תרגיל 2",s:"שערוך שנתי + עלויות עסקה",c:C.blueM},
        {id:3,t:"תרגיל 3",s:"הפחתת קרן (כל שנתיים)",c:C.pur},
        {id:4,t:"תרגיל 4",s:"הפחתת קרן (שנתי)",c:C.grn},
      ];
      
      return(
        <div dir="rtl" style={{fontFamily:"'Heebo',sans-serif",background:C.bg,minHeight:"100vh", paddingBottom: 60}}>
          <div style={{background:"#fff",borderBottom:`1px solid ${C.bdr}`,padding:"16px 20px",position:"sticky",top:0,zIndex:10}}>
            <div style={{maxWidth:920,margin:"0 auto"}}>
              <div style={{fontSize:10,color:C.txtL,letterSpacing:2,fontWeight:600}}>IAS 16 — REVALUATION MODEL</div>
              <div style={{fontFamily:"'Rubik',sans-serif",fontSize:20,fontWeight:800,color:C.txt}}>מדריך למידה אינטראקטיבי — רכוש קבוע</div>
            </div>
          </div>
          
          <div style={{maxWidth:920,margin:"0 auto",padding:"20px 14px"}}>
            <div style={{display:"flex",gap:6,marginBottom:20,flexWrap:"wrap"}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setEx(t.id)} style={{padding:"8px 16px",borderRadius:8,border:ex===t.id?`2px solid ${t.c}`:`1px solid ${C.bdr}`,background:ex===t.id?t.c+"12":"#fff",cursor:"pointer",textAlign:"right", transition:"all 0.2s"}}>
                <div style={{fontWeight:700,fontSize:13,color:ex===t.id?t.c:C.txt}}>{t.t}</div>
                <div style={{fontSize:10,color:C.txtL}}>{t.s}</div>
              </button>
            ))}
          </div>
          
          <Info type="info">
            <b>הוראות עבודה:</b><br/>
            1. פתרו כל שלב לפי הסדר והקלידו ערך מספרי (ניתן להזין פסיקים, למשל: 1,000).<br/>
            2. <b>אין צורך בספרות עשרוניות</b> - עגלו תמיד למספר השלם הקרוב ביותר (המערכת סולחת על סטיות עיגול קלות).<br/>
            3. אם טעיתם, יופיע כפתור שיציג לכם את <b>דרך החישוב המלאה</b>, ולאחר 3 ניסיונות תוכלו גם לגלות את התשובה הסופית.
          </Info>
          
            {ex===1&&<Ex1/>}
            {ex===2&&<Ex2/>}
            {ex===3&&<Ex3/>}
            {ex===4&&<Ex4/>}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
